<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaze Challenge — Astra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=Geist+Mono:wght@300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #f8f9fa;
      --surface:     #ffffff;
      --surface-alt: #f1f3f5;
      --border:      #ced4da;
      --text:        #111418;
      --text-muted:  #6c757d;
      --accent:      #ad1a04;
      --font:        'IBM Plex Sans', system-ui, sans-serif;
      --mono:        'Geist Mono', 'JetBrains Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      background-image: repeating-linear-gradient(
        0deg,
        rgba(206,212,218,0.45) 0px,
        rgba(206,212,218,0.45) 1px,
        transparent 1px,
        transparent 24px
      );
    }

    .container {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      padding: 40px 32px;
      position: relative;
    }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }

    .wordmark {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .wordmark .tri { color: var(--accent); font-size: 0.7em; }

    .header-text { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; }

    .instruction { font-size: 18px; font-weight: 500; margin-bottom: 6px; letter-spacing: -0.01em; }
    .instruction-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.5; }

    .progress-bar { width: 100%; height: 2px; background: var(--surface-alt); border: 1px solid var(--border); margin-bottom: 40px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); width: 100%; transition: width 0.1s linear; }

    .challenge-area {
      width: 240px;
      height: 240px;
      margin: 0 auto 24px;
      position: relative;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .gaze-target {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      transition: left 1.2s ease, top 1.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gaze-target::after {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }

    .gaze-target.locked {
      box-shadow: 0 0 0 4px rgba(173,26,4,0.12);
    }

    .gaze-cursor {
      position: absolute;
      width: 12px;
      height: 12px;
      border: 1px solid var(--text);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: left 0.05s linear, top 0.05s linear;
    }

    .mode-pill {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .status { display: flex; justify-content: center; gap: 40px; margin-bottom: 24px; }
    .status-item { text-align: center; display: flex; flex-direction: column; gap: 4px; }
    .status-value { font-size: 22px; font-weight: 300; font-variant-numeric: tabular-nums; }
    .status-value.done { color: var(--accent); }
    .status-label { font-family: var(--mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }

    .hint { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-align: center; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.1em; }

    .action-area { border-top: 1px solid var(--border); padding-top: 24px; }

    .action-btn {
      width: 100%;
      padding: 12px 20px;
      background: var(--text);
      color: var(--bg);
      border: none;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 150ms ease;
    }
    .action-btn:hover { background: #000; }
    .action-btn:disabled { background: var(--surface-alt); color: var(--text-muted); border: 1px solid var(--border); cursor: not-allowed; }

    .meta { display: flex; justify-content: space-between; margin-top: 14px; font-family: var(--mono); font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

    @media (max-width: 400px) { .container { padding: 32px 24px; } .challenge-area { width: 220px; height: 220px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="wordmark"><span class="tri">▲</span> Astra</span>
      <span class="header-text">Gaze</span>
    </div>

    <div class="instruction">Follow the target</div>
    <div class="instruction-sub">Keep your cursor on the circle as it moves. Camera optional — mouse tracked when unavailable.</div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="mode-pill" id="modePill">Cursor tracking mode</div>

    <div class="challenge-area" id="gazeArea">
      <div class="gaze-target" id="gazeTarget"></div>
      <div class="gaze-cursor" id="gazeCursor"></div>
    </div>

    <div class="status">
      <div class="status-item">
        <div class="status-value" id="lockVal">0.0s</div>
        <div class="status-label">Locked</div>
      </div>
      <div class="status-item">
        <div class="status-value" id="requiredVal">1.5s</div>
        <div class="status-label">Required</div>
      </div>
    </div>

    <div class="hint">Stay inside the circle</div>

    <div class="action-area">
      <button class="action-btn" id="actionBtn" disabled>Tracking...</button>
      <div class="meta">
        <span>ASTRA-GAZE</span>
        <span id="timestamp"></span>
      </div>
    </div>
  </div>

  <script>
    const area = document.getElementById('gazeArea');
    const target = document.getElementById('gazeTarget');
    const cursor = document.getElementById('gazeCursor');
    const progressFill = document.getElementById('progressFill');
    const lockVal = document.getElementById('lockVal');
    const actionBtn = document.getElementById('actionBtn');
    const timestamp = document.getElementById('timestamp');

    timestamp.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });

    const duration = 6000;
    const requiredLock = 1500;
    const startTime = Date.now();
    let locked = 0;
    let finished = false;

    const positions = [
      { x: 30, y: 30 }, { x: 170, y: 30 },
      { x: 30, y: 170 }, { x: 170, y: 170 },
      { x: 100, y: 100 }
    ];
    let posIndex = 0;
    function moveTarget() {
      posIndex = (posIndex + 1) % positions.length;
      const p = positions[posIndex];
      target.style.left = p.x + 'px';
      target.style.top = p.y + 'px';
    }
    moveTarget();
    const moveTimer = setInterval(() => { if (!finished) moveTarget(); }, 1500);

    function targetCenter() {
      return { x: parseFloat(target.style.left) + 20, y: parseFloat(target.style.top) + 20 };
    }

    function onMove(e) {
      if (!e.isTrusted || finished) return;
      const r = area.getBoundingClientRect();
      const x = e.clientX - r.left;
      const y = e.clientY - r.top;
      cursor.style.left = x + 'px';
      cursor.style.top = y + 'px';
    }

    document.addEventListener('mousemove', onMove);

    function tick() {
      const elapsed = Date.now() - startTime;
      progressFill.style.width = (Math.max(0, duration - elapsed) / duration * 100) + '%';

      const cx = parseFloat(cursor.style.left) || -100;
      const cy = parseFloat(cursor.style.top) || -100;
      const t = targetCenter();
      const dist = Math.hypot(cx - t.x, cy - t.y);

      if (dist < 28) {
        locked += 16;
        target.classList.add('locked');
        if (locked >= requiredLock) {
          finished = true;
          clearInterval(moveTimer);
          lockVal.classList.add('done');
          return handleSuccess();
        }
      } else {
        locked = Math.max(0, locked - 8);
        target.classList.remove('locked');
      }
      lockVal.textContent = (locked / 1000).toFixed(1) + 's';

      if (elapsed < duration) requestAnimationFrame(tick);
      else handleTimeout();
    }

    function handleSuccess() {
      actionBtn.textContent = 'Verified';
      actionBtn.disabled = false;
      progressFill.style.background = 'var(--accent)';
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'astra-challenge-result',
          challenge: 'gaze',
          success: true,
          lockedMs: locked
        }, window.location.origin);
      }
    }

    function handleTimeout() {
      actionBtn.textContent = 'Try again';
      actionBtn.disabled = false;
      actionBtn.onclick = () => location.reload();
    }

    tick();
  </script>
</body>
</html>
