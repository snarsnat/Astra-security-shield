<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microchain Challenge — Astra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=Geist+Mono:wght@300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #f8f9fa;
      --surface:     #ffffff;
      --surface-alt: #f1f3f5;
      --border:      #ced4da;
      --text:        #111418;
      --text-muted:  #6c757d;
      --accent:      #ad1a04;
      --font:        'IBM Plex Sans', system-ui, sans-serif;
      --mono:        'Geist Mono', 'JetBrains Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      background-image: repeating-linear-gradient(
        0deg,
        rgba(206,212,218,0.45) 0px,
        rgba(206,212,218,0.45) 1px,
        transparent 1px,
        transparent 24px
      );
    }

    .container {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      padding: 40px 32px;
      position: relative;
    }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }

    .wordmark {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .wordmark .tri { color: var(--accent); font-size: 0.7em; }

    .header-text { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; }

    .instruction { font-size: 18px; font-weight: 500; margin-bottom: 6px; letter-spacing: -0.01em; }
    .instruction-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.5; }

    .progress-bar { width: 100%; height: 2px; background: var(--surface-alt); border: 1px solid var(--border); margin-bottom: 28px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); width: 100%; transition: width 0.1s linear; }

    .chain {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .chain-step {
      width: 44px;
      height: 44px;
      border: 1px solid var(--border);
      background: var(--surface-alt);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.15s ease;
    }

    .chain-step.active { border-color: var(--accent); color: var(--accent); }
    .chain-step.done { border-color: var(--accent); background: var(--accent); color: var(--bg); }

    .chain-arrow {
      width: 16px;
      height: 1px;
      background: var(--border);
      position: relative;
    }

    .chain-arrow::after {
      content: '';
      position: absolute;
      right: -4px;
      top: -3px;
      border-left: 6px solid var(--border);
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
    }

    .chain-arrow.done { background: var(--accent); }
    .chain-arrow.done::after { border-left-color: var(--accent); }

    .action-zone {
      width: 100%;
      height: 140px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      cursor: pointer;
      touch-action: none;
      user-select: none;
      transition: border-color 0.12s ease;
    }

    .action-zone.active { border-color: var(--accent); color: var(--text); }

    .status { display: flex; justify-content: center; gap: 40px; margin-bottom: 24px; }
    .status-item { text-align: center; display: flex; flex-direction: column; gap: 4px; }
    .status-value { font-size: 22px; font-weight: 300; font-variant-numeric: tabular-nums; }
    .status-value.done { color: var(--accent); }
    .status-label { font-family: var(--mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }

    .hint { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-align: center; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.1em; }

    .action-area { border-top: 1px solid var(--border); padding-top: 24px; }

    .action-btn {
      width: 100%;
      padding: 12px 20px;
      background: var(--text);
      color: var(--bg);
      border: none;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 150ms ease;
    }
    .action-btn:hover { background: #000; }
    .action-btn:disabled { background: var(--surface-alt); color: var(--text-muted); border: 1px solid var(--border); cursor: not-allowed; }

    .meta { display: flex; justify-content: space-between; margin-top: 14px; font-family: var(--mono); font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

    @media (max-width: 400px) { .container { padding: 32px 24px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="wordmark"><span class="tri">▲</span> Astra</span>
      <span class="header-text">Microchain</span>
    </div>

    <div class="instruction">Complete the chain</div>
    <div class="instruction-sub">Perform each action in order. Chain breaks if you skip a step.</div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="chain" id="chain"></div>

    <div class="action-zone" id="actionZone">Flick up</div>

    <div class="status">
      <div class="status-item">
        <div class="status-value" id="stepVal">1/3</div>
        <div class="status-label">Step</div>
      </div>
      <div class="status-item">
        <div class="status-value" id="actionVal">FLICK</div>
        <div class="status-label">Action</div>
      </div>
    </div>

    <div class="hint" id="hintText">Swipe up in the zone</div>

    <div class="action-area">
      <button class="action-btn" id="actionBtn" disabled>Waiting...</button>
      <div class="meta">
        <span>ASTRA-MICROCHAIN</span>
        <span id="timestamp"></span>
      </div>
    </div>
  </div>

  <script>
    const chain = document.getElementById('chain');
    const zone = document.getElementById('actionZone');
    const progressFill = document.getElementById('progressFill');
    const stepVal = document.getElementById('stepVal');
    const actionVal = document.getElementById('actionVal');
    const hintText = document.getElementById('hintText');
    const actionBtn = document.getElementById('actionBtn');
    const timestamp = document.getElementById('timestamp');

    timestamp.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });

    const actionPool = [
      { type: 'flick', label: 'Flick up', hint: 'Swipe up in the zone', short: 'FLICK' },
      { type: 'tap', count: 2, label: 'Tap twice', hint: 'Double-tap the zone', short: 'TAP×2' },
      { type: 'tap', count: 3, label: 'Tap 3×', hint: 'Tap the zone 3 times', short: 'TAP×3' },
      { type: 'hold', duration: 800, label: 'Hold 0.8s', hint: 'Press and hold for 0.8s', short: 'HOLD' },
      { type: 'hold', duration: 1200, label: 'Hold 1.2s', hint: 'Press and hold for 1.2s', short: 'HOLD+' },
    ];
    // Pick 3 distinct action types, shuffle
    const shuffled = actionPool.slice().sort(() => Math.random() - 0.5);
    const seen = new Set();
    const actions = [];
    for (const a of shuffled) {
      if (!seen.has(a.type) && actions.length < 3) { seen.add(a.type); actions.push(a); }
    }
    while (actions.length < 3) actions.push(actionPool[actions.length]);

    for (let i = 0; i < actions.length; i++) {
      const step = document.createElement('div');
      step.className = 'chain-step';
      step.textContent = i + 1;
      step.dataset.index = i;
      chain.appendChild(step);
      if (i < actions.length - 1) {
        const arr = document.createElement('div');
        arr.className = 'chain-arrow';
        arr.dataset.arrowIndex = i;
        chain.appendChild(arr);
      }
    }

    const duration = 8000;
    const startTime = Date.now();
    let cur = 0;
    let tapCount = 0;
    let holdStart = 0;
    let holding = false;
    let flickStart = null;
    let finished = false;

    function refreshChain() {
      document.querySelectorAll('.chain-step').forEach(el => {
        const i = parseInt(el.dataset.index, 10);
        el.classList.remove('active', 'done');
        if (i < cur) el.classList.add('done');
        else if (i === cur) el.classList.add('active');
      });
      document.querySelectorAll('.chain-arrow').forEach(el => {
        const i = parseInt(el.dataset.arrowIndex, 10);
        el.classList.toggle('done', i < cur);
      });
    }

    function setPrompt() {
      if (cur >= actions.length) return;
      const a = actions[cur];
      zone.textContent = a.label;
      hintText.textContent = a.hint;
      actionVal.textContent = a.short;
      stepVal.textContent = (cur + 1) + '/' + actions.length;
      tapCount = 0;
      holding = false;
      holdStart = 0;
      flickStart = null;
      refreshChain();
    }

    function advance() {
      cur++;
      if (navigator.vibrate) navigator.vibrate(40);
      if (cur >= actions.length) {
        finished = true;
        refreshChain();
        handleSuccess();
      } else {
        setPrompt();
      }
    }

    function onDown(e) {
      if (!e.isTrusted || finished) return;
      e.preventDefault();
      const a = actions[cur];
      const t = e.touches && e.touches[0];
      const x = e.clientX ?? (t && t.clientX);
      const y = e.clientY ?? (t && t.clientY);

      if (a.type === 'flick') {
        flickStart = { x, y, t: Date.now() };
      } else if (a.type === 'hold') {
        holding = true;
        holdStart = Date.now();
        zone.classList.add('active');
      } else if (a.type === 'tap') {
        tapCount++;
        if (tapCount >= a.count) advance();
      }
    }

    function onMove(e) {
      if (!e.isTrusted || finished) return;
      const a = actions[cur];
      if (a.type !== 'flick' || !flickStart) return;
      const t = e.touches && e.touches[0];
      const y = e.clientY ?? (t && t.clientY);
      if (y === undefined) return;
      if (flickStart.y - y > 60 && Date.now() - flickStart.t < 800) {
        flickStart = null;
        advance();
      }
    }

    function onUp(e) {
      if (!e.isTrusted || finished) return;
      const a = actions[cur];
      if (a.type === 'hold') {
        holding = false;
        zone.classList.remove('active');
        holdStart = 0;
      }
      if (a.type === 'flick') flickStart = null;
    }

    zone.addEventListener('mousedown', onDown);
    zone.addEventListener('touchstart', onDown, { passive: false });
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchend', onUp);

    function tick() {
      const elapsed = Date.now() - startTime;
      progressFill.style.width = (Math.max(0, duration - elapsed) / duration * 100) + '%';
      if (holding && actions[cur] && actions[cur].type === 'hold') {
        if (Date.now() - holdStart >= actions[cur].duration) {
          holding = false;
          zone.classList.remove('active');
          advance();
        }
      }
      if (finished) return;
      if (elapsed < duration) requestAnimationFrame(tick);
      else handleTimeout();
    }

    function handleSuccess() {
      actionBtn.textContent = 'Verified';
      actionBtn.disabled = false;
      progressFill.style.background = 'var(--accent)';
      stepVal.classList.add('done');
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'astra-challenge-result',
          challenge: 'microchain',
          success: true
        }, window.location.origin);
      }
    }

    function handleTimeout() {
      actionBtn.textContent = 'Challenge failed';
      actionBtn.disabled = true;
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'astra-challenge-result', challenge: 'microchain', success: false }, window.location.origin);
      }
    }

    setPrompt();
    tick();
  </script>
</body>
</html>
