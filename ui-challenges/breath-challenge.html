<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breath Challenge - Astra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-alt: #1a1a1a;
      --border: #2a2a2a;
      --text: #e5e5e5;
      --text-muted: #737373;
      --accent: #22c55e;
      --font: 'Space Grotesk', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    .container {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 40px 32px;
      position: relative;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo {
      width: 32px;
      height: 32px;
      border-radius: 4px;
    }

    .header-text {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .instruction {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .instruction-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.4;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--border);
      margin-bottom: 40px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 100%;
      transition: width 0.1s linear;
    }

    .challenge-area {
      width: 200px;
      height: 200px;
      margin: 0 auto 32px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .breath-circle {
      width: 100px;
      height: 100px;
      background: var(--surface-alt);
      border: 2px solid var(--border);
      border-radius: 50%;
      position: relative;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .breath-circle::after {
      content: '';
      position: absolute;
      inset: 8px;
      background: var(--text);
      border-radius: 50%;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .breath-circle.inhale {
      transform: scale(1.4);
      border-color: var(--accent);
    }

    .breath-circle.inhale::after {
      transform: scale(0.7);
      opacity: 0.6;
    }

    .breath-circle.exhale {
      transform: scale(1);
      border-color: var(--border);
    }

    .breath-circle.exhale::after {
      transform: scale(1);
      opacity: 1;
    }

    .breath-circle.holding {
      border-color: var(--accent);
    }

    .breath-text {
      position: absolute;
      bottom: -40px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      transition: color 0.3s ease;
    }

    .breath-text.active {
      color: var(--accent);
    }

    .status {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 24px;
    }

    .status-item {
      text-align: center;
    }

    .status-value {
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .status-value.complete {
      color: var(--accent);
    }

    .status-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .hold-indicator {
      font-size: 12px;
      color: var(--accent);
      text-align: center;
      margin-bottom: 16px;
      height: 18px;
    }

    .action-area {
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .action-btn {
      width: 100%;
      padding: 12px 20px;
      background: var(--text);
      color: var(--bg);
      border: none;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.02em;
    }

    .action-btn:hover {
      background: #fff;
    }

    .action-btn:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      font-size: 10px;
      color: #404040;
    }

    @media (max-width: 400px) {
      .container {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="https://pbs.twimg.com/profile_images/1986017638590681089/6US4feXl_400x400.jpg" alt="Astra" class="logo">
      <span class="header-text">Breath Challenge</span>
    </div>

    <div class="instruction">Follow the breathing</div>
    <div class="instruction-sub">Hold during inhale. Expand the circle while breathing in.</div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="challenge-area" id="challengeArea">
      <div class="breath-circle" id="breathCircle"></div>
      <div class="breath-text" id="breathText">Press to start</div>
    </div>

    <div class="hold-indicator" id="holdIndicator"></div>

    <div class="status">
      <div class="status-item">
        <div class="status-value" id="holdTime">0.0s</div>
        <div class="status-label">Hold Time</div>
      </div>
      <div class="status-item">
        <div class="status-value" id="requiredTime">3.0s</div>
        <div class="status-label">Required</div>
      </div>
    </div>

    <div class="hint" id="hint">Hold mouse/touch during inhale</div>

    <div class="action-area">
      <button class="action-btn" id="actionBtn" disabled>Start breathing</button>
      <div class="meta">
        <span>ASTRA-BREATH</span>
        <span id="timestamp"></span>
      </div>
    </div>
  </div>

  <script>
    const challengeArea = document.getElementById('challengeArea');
    const breathCircle = document.getElementById('breathCircle');
    const breathText = document.getElementById('breathText');
    const progressFill = document.getElementById('progressFill');
    const actionBtn = document.getElementById('actionBtn');
    const holdTime = document.getElementById('holdTime');
    const requiredTime = document.getElementById('requiredTime');
    const holdIndicator = document.getElementById('holdIndicator');
    const hint = document.getElementById('hint');
    const timestamp = document.getElementById('timestamp');

    const duration = 10000;
    const requiredHold = 3000;
    const inhaleTime = 4000;
    const exhaleTime = 4000;

    let startTime = Date.now();
    let totalHoldTime = 0;
    let isHolding = false;
    let holdStartTime = 0;
    let cycleStartTime = 0;
    let hasStarted = false;

    timestamp.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });

    function startBreathing() {
      hasStarted = true;
      actionBtn.textContent = 'Breathing...';
      cycleStartTime = Date.now();
      animate();
    }

    function animate() {
      if (!hasStarted) return;

      const elapsed = Date.now() - startTime;
      const remaining = Math.max(0, duration - elapsed);
      progressFill.style.width = (remaining / duration * 100) + '%';

      const cycleElapsed = Date.now() - cycleStartTime;
      const cycleDuration = inhaleTime + exhaleTime;
      const cyclePosition = cycleElapsed % cycleDuration;
      const isInhaling = cyclePosition < inhaleTime;

      if (isInhaling) {
        const inhaleProgress = cyclePosition / inhaleTime;
        const scale = 0.6 + (inhaleProgress * 0.8);
        breathCircle.style.transform = `scale(${scale})`;
        breathCircle.className = 'breath-circle ' + (isHolding ? 'holding' : 'inhale');
        breathText.textContent = isHolding ? 'HOLD' : 'Breathe in';
        breathText.classList.toggle('active', isHolding);

        if (isHolding) {
          totalHoldTime += 16;
          holdIndicator.textContent = 'HOLDING';
        } else {
          holdIndicator.textContent = '';
        }
      } else {
        const exhaleProgress = (cyclePosition - inhaleTime) / exhaleTime;
        const scale = 1.4 - (exhaleProgress * 0.8);
        breathCircle.style.transform = `scale(${scale})`;
        breathCircle.className = 'breath-circle exhale';
        breathText.textContent = 'Breathe out';
        breathText.classList.remove('active');
        holdIndicator.textContent = '';
      }

      holdTime.textContent = (totalHoldTime / 1000).toFixed(1) + 's';

      if (totalHoldTime >= requiredHold) {
        handleSuccess();
        return;
      }

      if (remaining > 0) {
        requestAnimationFrame(animate);
      } else {
        handleTimeout();
      }
    }

    function handleHoldStart(e) {
      if (!e.isTrusted) return;
      e.preventDefault();
      if (!hasStarted) {
        startBreathing();
      }
      const cycleElapsed = Date.now() - cycleStartTime;
      const cyclePosition = cycleElapsed % (inhaleTime + exhaleTime);
      if (cyclePosition < inhaleTime) {
        isHolding = true;
        holdStartTime = Date.now();
      }
    }

    function handleHoldEnd(e) {
      if (!e.isTrusted) return;
      e.preventDefault();
      isHolding = false;
      holdIndicator.textContent = '';
    }

    function handleSuccess() {
      actionBtn.textContent = 'Verified';
      actionBtn.disabled = false;
      progressFill.style.background = 'var(--accent)';
      holdTime.classList.add('complete');
      if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'astra-challenge-complete', success: true, challenge: 'breath' }, '*');
      }
    }

    function handleTimeout() {
      actionBtn.textContent = 'Try again';
      actionBtn.disabled = false;
      actionBtn.onclick = () => location.reload();
    }

    challengeArea.addEventListener('mousedown', handleHoldStart);
    challengeArea.addEventListener('touchstart', handleHoldStart);
    document.addEventListener('mouseup', handleHoldEnd);
    document.addEventListener('touchend', handleHoldEnd);

    actionBtn.addEventListener('click', () => {
      if (!hasStarted) startBreathing();
    });
  </script>
</body>
</html>
