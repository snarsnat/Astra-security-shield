<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contextual Challenge — Astra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=Geist+Mono:wght@300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #f8f9fa;
      --surface:     #ffffff;
      --surface-alt: #f1f3f5;
      --border:      #ced4da;
      --text:        #111418;
      --text-2:      #495057;
      --text-muted:  #6c757d;
      --accent:      #ad1a04;
      --font:        'IBM Plex Sans', system-ui, sans-serif;
      --mono:        'Geist Mono', 'JetBrains Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      background-image: repeating-linear-gradient(
        0deg,
        rgba(206,212,218,0.45) 0px,
        rgba(206,212,218,0.45) 1px,
        transparent 1px,
        transparent 24px
      );
    }

    .container {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      padding: 40px 32px;
      position: relative;
    }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }

    .wordmark {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .wordmark .tri { color: var(--accent); font-size: 0.7em; }

    .header-text { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; }

    .instruction { font-size: 18px; font-weight: 500; margin-bottom: 6px; letter-spacing: -0.01em; }
    .instruction-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.5; }

    .progress-bar { width: 100%; height: 2px; background: var(--surface-alt); border: 1px solid var(--border); margin-bottom: 28px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); width: 100%; transition: width 0.1s linear; }

    .sentence-card {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-left: 2px solid var(--border);
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-2);
      font-style: italic;
    }

    .question {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 14px;
      letter-spacing: -0.01em;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }

    .option-btn {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      transition: border-color 0.12s ease, background 0.12s ease;
      text-align: left;
    }

    .option-btn:hover:not(:disabled) { border-color: var(--text-muted); }

    .option-btn.wrong { opacity: 0.2; border-color: var(--accent); pointer-events: none; }

    .option-btn.correct {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .option-btn:disabled { cursor: not-allowed; }

    .status { display: flex; justify-content: center; gap: 40px; margin-bottom: 24px; }
    .status-item { text-align: center; display: flex; flex-direction: column; gap: 4px; }
    .status-value { font-size: 22px; font-weight: 300; font-variant-numeric: tabular-nums; }
    .status-value.done { color: var(--accent); }
    .status-label { font-family: var(--mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }

    .hint { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-align: center; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.1em; }

    .action-area { border-top: 1px solid var(--border); padding-top: 24px; }

    .action-btn {
      width: 100%;
      padding: 12px 20px;
      background: var(--text);
      color: var(--bg);
      border: none;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 150ms ease;
    }
    .action-btn:hover { background: #000; }
    .action-btn:disabled { background: var(--surface-alt); color: var(--text-muted); border: 1px solid var(--border); cursor: not-allowed; }

    .meta { display: flex; justify-content: space-between; margin-top: 14px; font-family: var(--mono); font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

    @media (max-width: 400px) { .container { padding: 32px 24px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="wordmark"><span class="tri">▲</span> Astra</span>
      <span class="header-text">Contextual</span>
    </div>

    <div class="instruction">Answer from context</div>
    <div class="instruction-sub">Read the statement and answer the question below.</div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="sentence-card" id="sentenceCard"></div>
    <div class="question" id="questionText"></div>
    <div class="options" id="optionsList"></div>

    <div class="status">
      <div class="status-item">
        <div class="status-value" id="attemptsVal">0</div>
        <div class="status-label">Attempts</div>
      </div>
      <div class="status-item">
        <div class="status-value" id="timeVal">6.0s</div>
        <div class="status-label">Time</div>
      </div>
    </div>

    <div class="hint">Select the correct answer</div>

    <div class="action-area">
      <button class="action-btn" id="actionBtn" disabled>Waiting...</button>
      <div class="meta">
        <span>ASTRA-CONTEXTUAL</span>
        <span id="timestamp"></span>
      </div>
    </div>
  </div>

  <script>
    const sentenceCard = document.getElementById('sentenceCard');
    const questionText = document.getElementById('questionText');
    const optionsList = document.getElementById('optionsList');
    const progressFill = document.getElementById('progressFill');
    const attemptsVal = document.getElementById('attemptsVal');
    const timeVal = document.getElementById('timeVal');
    const actionBtn = document.getElementById('actionBtn');
    const timestamp = document.getElementById('timestamp');

    timestamp.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });

    const duration = 6000;
    const startTime = Date.now();

    const scenarios = [
      { sentence: 'The user clicked the blue button on the login page.', question: 'What color was the button?', options: ['Red', 'Blue', 'Green'], answer: 'Blue' },
      { sentence: 'The form had three fields: name, email, and password.', question: 'How many fields were in the form?', options: ['Two', 'Three', 'Four'], answer: 'Three' },
      { sentence: 'The login page was shown at 10:30 in the morning.', question: 'When was the page shown?', options: ['Morning', 'Afternoon', 'Evening'], answer: 'Morning' },
      { sentence: 'She bought four apples and two oranges at the store.', question: 'How many oranges did she buy?', options: ['One', 'Two', 'Four'], answer: 'Two' },
      { sentence: 'The package arrived on Tuesday afternoon in a green box.', question: 'What color was the box?', options: ['Blue', 'Green', 'Brown'], answer: 'Green' },
      { sentence: 'The server restarted successfully after the update completed.', question: 'What happened to the server?', options: ['Crashed', 'Restarted', 'Paused'], answer: 'Restarted' },
      { sentence: 'The dog ran across the yard and stopped at the red fence.', question: 'What color was the fence?', options: ['White', 'Red', 'Black'], answer: 'Red' },
      { sentence: 'There were five windows open on the browser.', question: 'How many windows were open?', options: ['Three', 'Four', 'Five'], answer: 'Five' },
      { sentence: 'The meeting was scheduled for 3 PM on Friday.', question: 'What day was the meeting?', options: ['Thursday', 'Friday', 'Saturday'], answer: 'Friday' },
      { sentence: 'The file was saved in the Documents folder on the desktop.', question: 'Where was the file saved?', options: ['Downloads', 'Documents', 'Desktop'], answer: 'Documents' },
      { sentence: 'She sent an email with two attachments to the team.', question: 'How many attachments were sent?', options: ['One', 'Two', 'Three'], answer: 'Two' },
      { sentence: 'The error appeared on line 42 of the config file.', question: 'On which line was the error?', options: ['24', '42', '420'], answer: '42' },
      { sentence: 'The alarm went off at 7 AM, waking everyone up.', question: 'What time did the alarm go off?', options: ['6 AM', '7 AM', '8 AM'], answer: '7 AM' },
      { sentence: 'The car turned left at the second traffic light.', question: 'Which direction did the car turn?', options: ['Right', 'Left', 'Straight'], answer: 'Left' },
      { sentence: 'The report was 12 pages long and had three charts.', question: 'How many charts were in the report?', options: ['Two', 'Three', 'Four'], answer: 'Three' }
    ];

    function escapeText(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    const scenario = scenarios[Math.floor(Math.random() * scenarios.length)];
    sentenceCard.textContent = scenario.sentence;
    questionText.textContent = scenario.question;

    let attempts = 0;
    let finished = false;

    const shuffled = scenario.options.slice();
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }

    shuffled.forEach(option => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = option;
      btn.addEventListener('click', function(e) {
        if (!e.isTrusted || finished) return;
        attempts++;
        attemptsVal.textContent = attempts;
        if (option === scenario.answer) {
          finished = true;
          btn.classList.add('correct');
          document.querySelectorAll('.option-btn').forEach(b => { if (b !== btn) b.disabled = true; });
          handleSuccess();
        } else {
          btn.classList.add('wrong');
          btn.disabled = true;
        }
      });
      optionsList.appendChild(btn);
    });

    function tick() {
      const elapsed = Date.now() - startTime;
      const remaining = Math.max(0, duration - elapsed);
      progressFill.style.width = (remaining / duration * 100) + '%';
      timeVal.textContent = (remaining / 1000).toFixed(1) + 's';
      if (finished) return;
      if (remaining > 0) requestAnimationFrame(tick);
      else handleTimeout();
    }

    function handleSuccess() {
      actionBtn.textContent = 'Verified';
      actionBtn.disabled = false;
      progressFill.style.background = 'var(--accent)';
      attemptsVal.classList.add('done');
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'astra-challenge-result',
          challenge: 'contextual',
          success: true,
          attempts: attempts
        }, window.location.origin);
      }
    }

    function handleTimeout() {
      actionBtn.textContent = 'Challenge failed';
      actionBtn.disabled = true;
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'astra-challenge-result', challenge: 'contextual', success: false }, window.location.origin);
      }
    }

    tick();
  </script>
</body>
</html>
