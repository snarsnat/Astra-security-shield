<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Challenge — Astra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=Geist+Mono:wght@300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #f8f9fa;
      --surface:     #ffffff;
      --surface-alt: #f1f3f5;
      --border:      #ced4da;
      --text:        #111418;
      --text-2:      #495057;
      --text-muted:  #6c757d;
      --accent:      #ad1a04;
      --font:        'IBM Plex Sans', system-ui, sans-serif;
      --mono:        'Geist Mono', 'JetBrains Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      background-image: repeating-linear-gradient(
        0deg,
        rgba(206,212,218,0.45) 0px,
        rgba(206,212,218,0.45) 1px,
        transparent 1px,
        transparent 24px
      );
    }

    .container {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      padding: 40px 32px;
      position: relative;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .wordmark .tri { color: var(--accent); font-size: 0.7em; }

    .header-text {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .instruction {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .instruction-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .progress-bar {
      width: 100%;
      height: 2px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      margin-bottom: 40px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 100%;
      transition: width 0.1s linear;
    }

    .challenge-area {
      width: 160px;
      height: 160px;
      margin: 0 auto 32px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .pulse-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 1px solid var(--border);
      border-radius: 50%;
      opacity: 0;
    }

    .pulse-ring:nth-child(1) { animation: pulse-ring 1.5s ease-out infinite; }
    .pulse-ring:nth-child(2) { animation: pulse-ring 1.5s ease-out infinite 0.3s; }
    .pulse-ring:nth-child(3) { animation: pulse-ring 1.5s ease-out infinite 0.6s; }

    @keyframes pulse-ring {
      0%   { transform: scale(0.8); opacity: 0.7; border-color: var(--accent); }
      100% { transform: scale(1.2); opacity: 0; border-color: var(--border); }
    }

    .pulse-core {
      width: 80px;
      height: 80px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s ease;
      position: relative;
    }

    .pulse-core::after {
      content: '';
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 50%;
      transition: transform 0.1s ease;
    }

    .pulse-core.tapped::after { transform: scale(1.3); }

    .challenge-area:hover .pulse-core { border-color: var(--text-muted); }

    .counter {
      position: absolute;
      bottom: -8px;
      right: -8px;
      width: 32px;
      height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .counter.success {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .action-area {
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .action-btn {
      width: 100%;
      padding: 12px 20px;
      background: var(--text);
      color: var(--bg);
      border: none;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 150ms ease;
    }
    .action-btn:hover { background: #000; }
    .action-btn:disabled {
      background: var(--surface-alt);
      color: var(--text-muted);
      border: 1px solid var(--border);
      cursor: not-allowed;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      margin-top: 14px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @media (max-width: 400px) { .container { padding: 32px 24px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="wordmark"><span class="tri">▲</span> Astra</span>
      <span class="header-text">Pulse</span>
    </div>

    <div class="instruction">Tap with the rhythm</div>
    <div class="instruction-sub">Tap the center circle when the rings pulse. Match the rhythm 3 times.</div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="challenge-area" id="challengeArea">
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-core" id="pulseCore"></div>
      <div class="counter" id="counter">0/3</div>
    </div>

    <div class="hint">Tap the circle</div>

    <div class="action-area">
      <button class="action-btn" id="actionBtn" disabled>Waiting...</button>
      <div class="meta">
        <span>ASTRA-PULSE</span>
        <span id="timestamp"></span>
      </div>
    </div>
  </div>

  <script>
    const challengeArea = document.getElementById('challengeArea');
    const pulseCore = document.getElementById('pulseCore');
    const counter = document.getElementById('counter');
    const progressFill = document.getElementById('progressFill');
    const actionBtn = document.getElementById('actionBtn');
    const timestamp = document.getElementById('timestamp');

    const requiredTaps = 3;
    let currentTaps = 0;
    let startTime = Date.now();
    const duration = 5000;

    timestamp.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });

    const ringTimings = [750, 1500, 2250];
    let tappedAt = [];

    function updateProgress() {
      const elapsed = Date.now() - startTime;
      const remaining = Math.max(0, duration - elapsed);
      progressFill.style.width = (remaining / duration * 100) + '%';
      if (remaining > 0) requestAnimationFrame(updateProgress);
      else handleTimeout();
    }

    function handleTap() {
      const elapsed = Date.now() - startTime;
      const expectedIndex = tappedAt.length;
      if (expectedIndex >= ringTimings.length) return;
      const expected = ringTimings[expectedIndex];
      const tolerance = 300;
      if (Math.abs(elapsed - expected) <= tolerance) {
        tappedAt.push(elapsed);
        currentTaps++;
        counter.textContent = currentTaps + '/' + requiredTaps;
        pulseCore.classList.add('tapped');
        setTimeout(() => pulseCore.classList.remove('tapped'), 100);
        if (navigator.vibrate) navigator.vibrate(30);
        if (currentTaps >= requiredTaps) {
          counter.classList.add('success');
          handleSuccess();
        }
      }
    }

    function handleSuccess() {
      actionBtn.textContent = 'Verified';
      actionBtn.disabled = false;
      progressFill.style.background = 'var(--accent)';
      setTimeout(() => {
        if (window.parent !== window) {
          window.parent.postMessage({
            type: 'astra-challenge-result',
            challenge: 'pulse',
            success: true,
            tappedAt: tappedAt
          }, window.location.origin);
        }
      }, 300);
    }

    function handleTimeout() {
      if (currentTaps < requiredTaps) {
        actionBtn.textContent = 'Try again';
        actionBtn.disabled = false;
        actionBtn.onclick = () => location.reload();
      }
    }

    challengeArea.addEventListener('click', function(e) {
      if (!e.isTrusted) return;
      handleTap();
    });
    challengeArea.addEventListener('touchstart', function(e) {
      if (!e.isTrusted) return;
      e.preventDefault();
      handleTap();
    });

    updateProgress();
  </script>
</body>
</html>
