<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astra Verification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=Geist+Mono:wght@300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #f8f9fa;
      --surface:     #ffffff;
      --surface-alt: #f1f3f5;
      --border:      #ced4da;
      --text:        #111418;
      --text-2:      #495057;
      --text-muted:  #6c757d;
      --accent:      #ad1a04;
      --font:        'IBM Plex Sans', system-ui, sans-serif;
      --mono:        'Geist Mono', 'JetBrains Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      background-image: repeating-linear-gradient(
        0deg,
        rgba(206,212,218,0.45) 0px,
        rgba(206,212,218,0.45) 1px,
        transparent 1px,
        transparent 24px
      );
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(241,243,245,0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2147483647;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .container {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      padding: 40px 32px;
      position: relative;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .wordmark .tri { color: var(--accent); font-size: 0.7em; }

    .shield-icon {
      width: 56px;
      height: 56px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .shield-icon svg {
      width: 28px;
      height: 28px;
      stroke: var(--accent);
      stroke-width: 1.8;
      fill: none;
    }

    .title {
      font-family: var(--font);
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 6px;
      letter-spacing: -0.015em;
    }

    .rule {
      width: 28px;
      height: 2px;
      background: var(--accent);
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 32px;
    }

    .action-btn {
      width: 100%;
      padding: 13px 20px;
      background: var(--text);
      color: var(--bg);
      border: none;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 150ms ease;
    }
    .action-btn:hover { background: #000; }

    .timestamp {
      position: absolute;
      bottom: 14px;
      right: 16px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @media (max-width: 400px) { .container { padding: 32px 24px; } }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="container">
      <div class="header">
        <span class="wordmark"><span class="tri">▲</span> Astra</span>
      </div>

      <div class="shield-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>

      <h1 class="title">Verify you're human</h1>
      <div class="rule"></div>
      <p class="subtitle">Complete a quick challenge to confirm you're a real person, not automated software.</p>

      <button class="action-btn" id="proceedBtn">Proceed to challenge</button>

      <span class="timestamp">ASTRA-SECURE</span>
    </div>
  </div>

  <script>
    const ALLOWED_CHALLENGES = new Set([
      'pulse', 'tilt', 'flick', 'breath'
    ]);

    const challenges = Array.from(ALLOWED_CHALLENGES);

    document.getElementById('proceedBtn').addEventListener('click', function(e) {
      if (!e.isTrusted) return;

      const randomChallenge = challenges[Math.floor(Math.random() * challenges.length)];

      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'astra-challenge',
          challenge: randomChallenge
        }, window.location.origin);
      } else {
        if (ALLOWED_CHALLENGES.has(randomChallenge)) {
          window.location.href = randomChallenge + '-challenge.html';
        }
      }
    });

    window.addEventListener('message', function(event) {
      if (event.origin !== window.location.origin) return;
      if (event.data && event.data.type === 'astra-init') {
        console.log('Astra SDK initialized');
      }
    });
  </script>
</body>
</html>
