<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rhythm Challenge — Astra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=Geist+Mono:wght@300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #f8f9fa;
      --surface:     #ffffff;
      --surface-alt: #f1f3f5;
      --border:      #ced4da;
      --text:        #111418;
      --text-muted:  #6c757d;
      --accent:      #ad1a04;
      --font:        'IBM Plex Sans', system-ui, sans-serif;
      --mono:        'Geist Mono', 'JetBrains Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      background-image: repeating-linear-gradient(
        0deg,
        rgba(206,212,218,0.45) 0px,
        rgba(206,212,218,0.45) 1px,
        transparent 1px,
        transparent 24px
      );
    }

    .container {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      padding: 40px 32px;
      position: relative;
    }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }

    .wordmark {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .wordmark .tri { color: var(--accent); font-size: 0.7em; }

    .header-text { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; }

    .instruction { font-size: 18px; font-weight: 500; margin-bottom: 6px; letter-spacing: -0.01em; }
    .instruction-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.5; }

    .progress-bar { width: 100%; height: 2px; background: var(--surface-alt); border: 1px solid var(--border); margin-bottom: 40px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); width: 100%; transition: width 0.1s linear; }

    .challenge-area { width: 100%; margin-bottom: 32px; }

    .pad-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 16px; }

    .rhythm-pad {
      width: 72px;
      height: 72px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.1s ease;
    }

    .rhythm-pad.active { background: var(--accent); border-color: var(--accent); color: var(--bg); transform: scale(0.95); }
    .rhythm-pad.cue { border-color: var(--accent); color: var(--accent); }

    .wave { height: 40px; position: relative; overflow: hidden; background: var(--surface-alt); border: 1px solid var(--border); }
    .wave-marker { position: absolute; top: 0; height: 100%; width: 1px; background: var(--accent); opacity: 0.5; }
    .wave-scan { position: absolute; top: 0; height: 100%; width: 1px; background: var(--text); left: 0; transition: left 0.05s linear; }

    .status { display: flex; justify-content: center; gap: 40px; margin-bottom: 24px; }
    .status-item { text-align: center; display: flex; flex-direction: column; gap: 4px; }
    .status-value { font-size: 22px; font-weight: 300; font-variant-numeric: tabular-nums; }
    .status-value.done { color: var(--accent); }
    .status-label { font-family: var(--mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }

    .hint { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-align: center; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.1em; }

    .action-area { border-top: 1px solid var(--border); padding-top: 24px; }

    .action-btn {
      width: 100%;
      padding: 12px 20px;
      background: var(--text);
      color: var(--bg);
      border: none;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 150ms ease;
    }
    .action-btn:hover { background: #000; }
    .action-btn:disabled { background: var(--surface-alt); color: var(--text-muted); border: 1px solid var(--border); cursor: not-allowed; }

    .meta { display: flex; justify-content: space-between; margin-top: 14px; font-family: var(--mono); font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

    @media (max-width: 400px) { .container { padding: 32px 24px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="wordmark"><span class="tri">▲</span> Astra</span>
      <span class="header-text">Rhythm</span>
    </div>

    <div class="instruction">Tap the rhythm pattern</div>
    <div class="instruction-sub">Listen for cues then tap each pad in sequence. Match the timing.</div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="challenge-area">
      <div class="pad-row">
        <div class="rhythm-pad" id="pad1" data-index="0">1</div>
        <div class="rhythm-pad" id="pad2" data-index="1">2</div>
        <div class="rhythm-pad" id="pad3" data-index="2">3</div>
      </div>
      <div class="wave" id="wave">
        <div class="wave-scan" id="waveScan"></div>
      </div>
    </div>

    <div class="status">
      <div class="status-item">
        <div class="status-value" id="progressVal">0/3</div>
        <div class="status-label">Progress</div>
      </div>
      <div class="status-item">
        <div class="status-value" id="patternVal">1-2-3</div>
        <div class="status-label">Pattern</div>
      </div>
    </div>

    <div class="hint">Tap pads in order</div>

    <div class="action-area">
      <button class="action-btn" id="actionBtn" disabled>Waiting...</button>
      <div class="meta">
        <span>ASTRA-RHYTHM</span>
        <span id="timestamp"></span>
      </div>
    </div>
  </div>

  <script>
    const progressFill = document.getElementById('progressFill');
    const actionBtn = document.getElementById('actionBtn');
    const progressVal = document.getElementById('progressVal');
    const waveScan = document.getElementById('waveScan');
    const wave = document.getElementById('wave');
    const timestamp = document.getElementById('timestamp');
    const pads = [document.getElementById('pad1'), document.getElementById('pad2'), document.getElementById('pad3')];

    timestamp.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });

    const duration = 7000;
    // Randomize which pad order the user must tap
    const padOrder = [0, 1, 2].sort(() => Math.random() - 0.5);
    // Randomize timing gaps: 400-900ms between beats
    const pattern = [];
    let t = 500 + Math.floor(Math.random() * 300);
    for (let i = 0; i < 3; i++) { pattern.push(t); t += 400 + Math.floor(Math.random() * 500); }
    const tolerance = 400;
    const startTime = Date.now();
    let currentStep = 0;
    let hits = [];

    pattern.forEach(t => {
      const m = document.createElement('div');
      m.className = 'wave-marker';
      m.style.left = ((t / duration) * 100) + '%';
      wave.appendChild(m);
    });

    // Show the randomized pad order as hint
    document.getElementById('patternVal').textContent = padOrder.map(x => x+1).join('-');

    function highlightCue() {
      const elapsed = Date.now() - startTime;
      pads.forEach(pad => pad.classList.remove('cue'));
      if (currentStep < 3 && Math.abs(elapsed - pattern[currentStep]) < 300) {
        pads[padOrder[currentStep]].classList.add('cue');
      }
    }

    function handleTap(i) {
      if (padOrder[currentStep] !== i) return;
      const elapsed = Date.now() - startTime;
      const expected = pattern[currentStep];
      if (Math.abs(elapsed - expected) <= tolerance) {
        pads[padOrder[currentStep]].classList.add('active');
        hits.push(elapsed);
        currentStep++;
        progressVal.textContent = currentStep + '/3';
        if (navigator.vibrate) navigator.vibrate(30);
        if (currentStep >= 3) {
          progressVal.classList.add('done');
          handleSuccess();
        }
      }
    }

    pads.forEach(pad => {
      pad.addEventListener('click', function(e) {
        if (!e.isTrusted) return;
        handleTap(parseInt(pad.dataset.index, 10));
      });
      pad.addEventListener('touchstart', function(e) {
        if (!e.isTrusted) return;
        e.preventDefault();
        handleTap(parseInt(pad.dataset.index, 10));
      });
    });

    function updateProgress() {
      const elapsed = Date.now() - startTime;
      const remaining = Math.max(0, duration - elapsed);
      progressFill.style.width = (remaining / duration * 100) + '%';
      waveScan.style.left = ((elapsed / duration) * 100) + '%';
      highlightCue();
      if (remaining > 0) requestAnimationFrame(updateProgress);
      else handleTimeout();
    }

    function handleSuccess() {
      actionBtn.textContent = 'Verified';
      actionBtn.disabled = false;
      progressFill.style.background = 'var(--accent)';
      const intervals = hits.map((h, i) => i > 0 ? h - hits[i-1] : h);
      const mean = intervals.reduce((a,b)=>a+b,0)/intervals.length;
      const variance = intervals.reduce((a,b)=>a+(b-mean)**2,0)/intervals.length;
      const cv = mean > 0 ? Math.sqrt(variance)/mean : 0;
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'astra-challenge-result',
          challenge: 'rhythm',
          success: true,
          hits,
          behaviorData: { timingCV: cv, sampleCount: hits.length }
        }, window.location.origin);
      }
    }

    function handleTimeout() {
      actionBtn.textContent = 'Challenge failed';
      actionBtn.disabled = true;
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'astra-challenge-result', challenge: 'rhythm', success: false }, window.location.origin);
      }
    }

    updateProgress();
  </script>
</body>
</html>
