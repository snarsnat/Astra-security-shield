<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantic Challenge — Astra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=Geist+Mono:wght@300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #f8f9fa;
      --surface:     #ffffff;
      --surface-alt: #f1f3f5;
      --border:      #ced4da;
      --text:        #111418;
      --text-muted:  #6c757d;
      --accent:      #ad1a04;
      --font:        'IBM Plex Sans', system-ui, sans-serif;
      --mono:        'Geist Mono', 'JetBrains Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      background-image: repeating-linear-gradient(
        0deg,
        rgba(206,212,218,0.45) 0px,
        rgba(206,212,218,0.45) 1px,
        transparent 1px,
        transparent 24px
      );
    }

    .container {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      padding: 40px 32px;
      position: relative;
    }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }

    .wordmark {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .wordmark .tri { color: var(--accent); font-size: 0.7em; }

    .header-text { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; }

    .instruction { font-size: 18px; font-weight: 500; margin-bottom: 6px; letter-spacing: -0.01em; }
    .instruction-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }

    .target-prompt {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent);
      padding: 12px 16px;
      margin-bottom: 28px;
      font-family: var(--mono);
      font-size: 13px;
      text-align: center;
      color: var(--accent);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .progress-bar { width: 100%; height: 2px; background: var(--surface-alt); border: 1px solid var(--border); margin-bottom: 32px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); width: 100%; transition: width 0.1s linear; }

    .challenge-area {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    .shape-cell {
      aspect-ratio: 1;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.12s ease;
    }

    .shape-cell:hover { border-color: var(--text-muted); }
    .shape-cell.wrong { opacity: 0.2; pointer-events: none; }

    .shape { width: 44px; height: 44px; }
    .shape.sz-sm { width: 28px; height: 28px; }
    .shape.sz-lg { width: 56px; height: 56px; }
    .shape-circle { border-radius: 50%; }
    .shape-square { border-radius: 0; }
    .shape-triangle {
      width: 0 !important;
      height: 0 !important;
      background: none !important;
      border-style: solid;
    }
    .shape-triangle.sz-sm { border-left-width: 14px; border-right-width: 14px; border-bottom-width: 28px; }
    .shape-triangle.sz-md { border-left-width: 22px; border-right-width: 22px; border-bottom-width: 44px; }
    .shape-triangle.sz-lg { border-left-width: 28px; border-right-width: 28px; border-bottom-width: 56px; }

    .status { display: flex; justify-content: center; gap: 40px; margin-bottom: 24px; }
    .status-item { text-align: center; display: flex; flex-direction: column; gap: 4px; }
    .status-value { font-size: 22px; font-weight: 300; font-variant-numeric: tabular-nums; }
    .status-value.done { color: var(--accent); }
    .status-label { font-family: var(--mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }

    .hint { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-align: center; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.1em; }

    .action-area { border-top: 1px solid var(--border); padding-top: 24px; }

    .action-btn {
      width: 100%;
      padding: 12px 20px;
      background: var(--text);
      color: var(--bg);
      border: none;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 150ms ease;
    }
    .action-btn:hover { background: #000; }
    .action-btn:disabled { background: var(--surface-alt); color: var(--text-muted); border: 1px solid var(--border); cursor: not-allowed; }

    .meta { display: flex; justify-content: space-between; margin-top: 14px; font-family: var(--mono); font-size: 9px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

    @media (max-width: 400px) { .container { padding: 32px 24px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="wordmark"><span class="tri">▲</span> Astra</span>
      <span class="header-text">Semantic</span>
    </div>

    <div class="instruction">Identify the target</div>
    <div class="instruction-sub">Select the shape matching the description. One tap only.</div>

    <div class="target-prompt" id="targetPrompt">Tap the blue circle</div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="challenge-area" id="challengeArea"></div>

    <div class="status">
      <div class="status-item">
        <div class="status-value" id="attemptsVal">0</div>
        <div class="status-label">Attempts</div>
      </div>
      <div class="status-item">
        <div class="status-value" id="timeVal">5.0s</div>
        <div class="status-label">Time</div>
      </div>
    </div>

    <div class="hint">Wrong choice disables cell</div>

    <div class="action-area">
      <button class="action-btn" id="actionBtn" disabled>Waiting...</button>
      <div class="meta">
        <span>ASTRA-SEMANTIC</span>
        <span id="timestamp"></span>
      </div>
    </div>
  </div>

  <script>
    const area = document.getElementById('challengeArea');
    const prompt = document.getElementById('targetPrompt');
    const progressFill = document.getElementById('progressFill');
    const attemptsVal = document.getElementById('attemptsVal');
    const timeVal = document.getElementById('timeVal');
    const actionBtn = document.getElementById('actionBtn');
    const timestamp = document.getElementById('timestamp');

    timestamp.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });

    const duration = 5000;
    const startTime = Date.now();

    const shapes = ['circle', 'square', 'triangle'];
    const palette = [
      { key: 'blue', hex: '#3b82f6' },
      { key: 'red', hex: '#ef4444' },
      { key: 'green', hex: '#22c55e' },
      { key: 'yellow', hex: '#f59e0b' }
    ];
    const sizes = [
      { key: 'small', cls: 'sz-sm' },
      { key: 'medium', cls: 'sz-md' },
      { key: 'large', cls: 'sz-lg' }
    ];

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    const cells = [];
    const target = { shape: pick(shapes), color: pick(palette), size: pick(sizes) };
    prompt.textContent = `Tap the ${target.size.key} ${target.color.key} ${target.shape}`;

    cells.push({ shape: target.shape, color: target.color, size: target.size });
    while (cells.length < 9) {
      const s = pick(shapes);
      const c = pick(palette);
      const z = pick(sizes);
      if (s === target.shape && c.key === target.color.key && z.key === target.size.key && cells.some(x => x.shape === s && x.color.key === c.key && x.size.key === z.key)) continue;
      cells.push({ shape: s, color: c, size: z });
    }
    for (let i = cells.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cells[i], cells[j]] = [cells[j], cells[i]];
    }

    let attempts = 0;
    let finished = false;

    cells.forEach(cell => {
      const el = document.createElement('div');
      el.className = 'shape-cell';
      const inner = document.createElement('div');
      inner.className = 'shape shape-' + cell.shape + ' ' + cell.size.cls;
      if (cell.shape === 'triangle') {
        inner.style.borderLeftColor = 'transparent';
        inner.style.borderRightColor = 'transparent';
        inner.style.borderBottomColor = cell.color.hex;
      } else {
        inner.style.background = cell.color.hex;
      }
      el.appendChild(inner);

      el.addEventListener('click', function(e) {
        if (!e.isTrusted || finished) return;
        attempts++;
        attemptsVal.textContent = attempts;
        if (cell.shape === target.shape && cell.color.key === target.color.key && cell.size.key === target.size.key) {
          finished = true;
          handleSuccess();
        } else {
          el.classList.add('wrong');
        }
      });

      area.appendChild(el);
    });

    function tick() {
      const elapsed = Date.now() - startTime;
      const remaining = Math.max(0, duration - elapsed);
      progressFill.style.width = (remaining / duration * 100) + '%';
      timeVal.textContent = (remaining / 1000).toFixed(1) + 's';
      if (finished) return;
      if (remaining > 0) requestAnimationFrame(tick);
      else handleTimeout();
    }

    function handleSuccess() {
      actionBtn.textContent = 'Verified';
      actionBtn.disabled = false;
      progressFill.style.background = 'var(--accent)';
      attemptsVal.classList.add('done');
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'astra-challenge-result',
          challenge: 'semantic',
          success: true,
          attempts: attempts
        }, window.location.origin);
      }
    }

    function handleTimeout() {
      actionBtn.textContent = 'Challenge failed';
      actionBtn.disabled = true;
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'astra-challenge-result', challenge: 'semantic', success: false }, window.location.origin);
      }
    }

    tick();
  </script>
</body>
</html>
