<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantic Challenge - Astra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-alt: #1a1a1a;
      --border: #2a2a2a;
      --text: #e5e5e5;
      --text-muted: #737373;
      --accent: #22c55e;
      --warning: #ef4444;
      --font: 'Space Grotesk', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    .container {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 40px 32px;
      position: relative;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo { width: 32px; height: 32px; border-radius: 4px; }

    .header-text {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .instruction {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .instruction-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .target-prompt {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      padding: 12px 16px;
      margin-bottom: 32px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      color: var(--accent);
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--border);
      margin-bottom: 40px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 100%;
      transition: width 0.1s linear;
    }

    .challenge-area {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .shape-cell {
      aspect-ratio: 1;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .shape-cell:hover {
      border-color: var(--text-muted);
    }

    .shape-cell.wrong {
      opacity: 0.25;
      pointer-events: none;
    }

    .shape {
      width: 44px;
      height: 44px;
    }

    .shape-circle {
      border-radius: 50%;
    }

    .shape-square {
      border-radius: 2px;
    }

    .shape-triangle {
      width: 0;
      height: 0;
      border-left: 24px solid transparent;
      border-right: 24px solid transparent;
      border-bottom: 44px solid currentColor;
      background: none !important;
    }

    .status {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 24px;
    }

    .status-item { text-align: center; }

    .status-value {
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .status-value.done { color: var(--accent); }

    .status-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .action-area {
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .action-btn {
      width: 100%;
      padding: 12px 20px;
      background: var(--text);
      color: var(--bg);
      border: none;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.02em;
    }

    .action-btn:hover { background: #fff; }
    .action-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

    .meta {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      font-size: 10px;
      color: #404040;
    }

    @media (max-width: 400px) {
      .container { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="https://pbs.twimg.com/profile_images/1986017638590681089/6US4feXl_400x400.jpg" alt="Astra" class="logo">
      <span class="header-text">Semantic Challenge</span>
    </div>

    <div class="instruction">Identify the target</div>
    <div class="instruction-sub">Select the shape matching the description. One tap only.</div>

    <div class="target-prompt" id="targetPrompt">Tap the blue circle</div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="challenge-area" id="challengeArea"></div>

    <div class="status">
      <div class="status-item">
        <div class="status-value" id="attemptsVal">0</div>
        <div class="status-label">Attempts</div>
      </div>
      <div class="status-item">
        <div class="status-value" id="timeVal">5.0s</div>
        <div class="status-label">Time</div>
      </div>
    </div>

    <div class="hint">Wrong choice disables cell</div>

    <div class="action-area">
      <button class="action-btn" id="actionBtn" disabled>Waiting...</button>
      <div class="meta">
        <span>ASTRA-SEMANTIC</span>
        <span id="timestamp"></span>
      </div>
    </div>
  </div>

  <script>
    const area = document.getElementById('challengeArea');
    const prompt = document.getElementById('targetPrompt');
    const progressFill = document.getElementById('progressFill');
    const attemptsVal = document.getElementById('attemptsVal');
    const timeVal = document.getElementById('timeVal');
    const actionBtn = document.getElementById('actionBtn');
    const timestamp = document.getElementById('timestamp');

    timestamp.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });

    const duration = 5000;
    const startTime = Date.now();

    const shapes = ['circle', 'square', 'triangle'];
    const palette = [
      { key: 'blue', hex: '#3b82f6' },
      { key: 'red', hex: '#ef4444' },
      { key: 'green', hex: '#22c55e' },
      { key: 'yellow', hex: '#f59e0b' }
    ];

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    const cells = [];
    const target = { shape: pick(shapes), color: pick(palette) };
    prompt.textContent = `Tap the ${target.color.key} ${target.shape}`;

    cells.push({ shape: target.shape, color: target.color });
    while (cells.length < 9) {
      const s = pick(shapes);
      const c = pick(palette);
      if (s === target.shape && c.key === target.color.key && cells.some(x => x.shape === s && x.color.key === c.key)) continue;
      cells.push({ shape: s, color: c });
    }
    for (let i = cells.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cells[i], cells[j]] = [cells[j], cells[i]];
    }

    let attempts = 0;
    let finished = false;

    cells.forEach(cell => {
      const el = document.createElement('div');
      el.className = 'shape-cell';
      const inner = document.createElement('div');
      inner.className = 'shape shape-' + cell.shape;
      if (cell.shape === 'triangle') {
        inner.style.color = cell.color.hex;
      } else {
        inner.style.background = cell.color.hex;
      }
      el.appendChild(inner);

      el.addEventListener('click', function(e) {
        if (!e.isTrusted || finished) return;
        attempts++;
        attemptsVal.textContent = attempts;
        if (cell.shape === target.shape && cell.color.key === target.color.key) {
          finished = true;
          handleSuccess();
        } else {
          el.classList.add('wrong');
        }
      });

      area.appendChild(el);
    });

    function tick() {
      const elapsed = Date.now() - startTime;
      const remaining = Math.max(0, duration - elapsed);
      progressFill.style.width = (remaining / duration * 100) + '%';
      timeVal.textContent = (remaining / 1000).toFixed(1) + 's';
      if (finished) return;
      if (remaining > 0) requestAnimationFrame(tick);
      else handleTimeout();
    }

    function handleSuccess() {
      actionBtn.textContent = 'Verified';
      actionBtn.disabled = false;
      progressFill.style.background = 'var(--accent)';
      attemptsVal.classList.add('done');
      if (window.parent !== window) {
        window.parent.postMessage({
          type: 'astra-challenge-result',
          challenge: 'semantic',
          success: true,
          attempts: attempts
        }, window.location.origin);
      }
    }

    function handleTimeout() {
      actionBtn.textContent = 'Try again';
      actionBtn.disabled = false;
      actionBtn.onclick = () => location.reload();
    }

    tick();
  </script>
</body>
</html>
