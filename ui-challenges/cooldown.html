<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Astra Shield — Cooldown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=Geist+Mono:wght@300..700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --bg:          #f8f9fa;
    --surface:     #ffffff;
    --surface-alt: #f1f3f5;
    --border:      #ced4da;
    --text:        #111418;
    --text-muted:  #6c757d;
    --accent:      #ad1a04;
    --font:        'IBM Plex Sans', system-ui, sans-serif;
    --mono:        'Geist Mono', 'JetBrains Mono', ui-monospace, monospace;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100%;
    width: 100%;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    background-image: repeating-linear-gradient(
      0deg,
      rgba(206,212,218,0.45) 0px,
      rgba(206,212,218,0.45) 1px,
      transparent 1px,
      transparent 24px
    );
  }

  .astra-cooldown-root {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
    z-index: 2147483647;
  }

  .astra-cooldown-card {
    max-width: 480px;
    width: 100%;
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    background: var(--surface);
    padding: 48px 32px 40px;
    position: relative;
  }

  .astra-logo {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 32px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .astra-logo .tri { color: var(--accent); font-size: 0.75em; }

  .astra-icon {
    width: 52px;
    height: 52px;
    border: 1px solid var(--accent);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }

  .astra-icon svg {
    width: 26px;
    height: 26px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .astra-headline {
    font-size: 20px;
    font-weight: 500;
    line-height: 1.3;
    margin: 0 0 10px;
    letter-spacing: -0.01em;
  }

  .astra-sub {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.55;
    margin: 0 0 32px;
  }

  .astra-timer {
    font-family: var(--mono);
    font-size: 80px;
    font-weight: 300;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--accent);
    margin-bottom: 8px;
    font-variant-numeric: tabular-nums;
  }

  .astra-timer-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .astra-progress-track {
    height: 2px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    width: 100%;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .astra-progress-bar {
    height: 100%;
    background: var(--accent);
    width: 100%;
    transition: width 1s linear;
  }

  .astra-fineprint {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.55;
    border-top: 1px solid var(--border);
    padding-top: 20px;
    margin: 0;
  }

  .astra-meta {
    margin-top: 20px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="astra-cooldown-root" role="alertdialog" aria-modal="true" aria-labelledby="astra-cooldown-headline">
    <div class="astra-cooldown-card">
      <div class="astra-logo"><span class="tri">▲</span> Astra Shield</div>

      <div class="astra-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"/>
          <polyline points="12 7 12 12 15 14"/>
        </svg>
      </div>

      <h1 id="astra-cooldown-headline" class="astra-headline">Too many failed challenges</h1>
      <p class="astra-sub">Astra detected suspicious repeated attempts. Please wait before trying again.</p>

      <div id="astra-cooldown-timer" class="astra-timer">60</div>
      <div class="astra-timer-label">Seconds remaining</div>

      <div class="astra-progress-track">
        <div id="astra-cooldown-progress" class="astra-progress-bar"></div>
      </div>

      <p class="astra-fineprint">This helps keep bots out while giving real users a fair chance.</p>
      <div class="astra-meta">COOLDOWN ACTIVE</div>
    </div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var totalSeconds = parseInt(params.get('seconds') || '60', 10);
      if (!totalSeconds || totalSeconds < 1) totalSeconds = 60;

      var timerEl = document.getElementById('astra-cooldown-timer');
      var progressEl = document.getElementById('astra-cooldown-progress');
      var remaining = totalSeconds;

      function tick() {
        timerEl.textContent = String(remaining);
        var pct = Math.max(0, (remaining / totalSeconds) * 100);
        progressEl.style.width = pct + '%';
        if (remaining <= 0) {
          try {
            window.parent && window.parent.postMessage({ type: 'astra:cooldown:complete' }, '*');
          } catch (e) {}
          setTimeout(function () { window.location.reload(); }, 500);
          return;
        }
        remaining -= 1;
        setTimeout(tick, 1000);
      }

      tick();

      window.addEventListener('beforeunload', function () {});
    })();
  </script>
</body>
</html>
