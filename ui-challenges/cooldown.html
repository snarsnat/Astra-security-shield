<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Astra Shield — Cooldown</title>
<style>
  :root {
    --bg: #0a0a0a;
    --bg-alt: #111111;
    --border: #1f1f1f;
    --text: #f5f5f5;
    --text-muted: #888888;
    --accent: #ef4444;
    --accent-soft: rgba(239, 68, 68, 0.12);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  .astra-cooldown-root {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
    z-index: 2147483647;
  }

  .astra-cooldown-card {
    max-width: 480px;
    width: 100%;
    border: 1px solid var(--border);
    background: var(--bg-alt);
    padding: 48px 32px 40px;
    position: relative;
  }

  .astra-cooldown-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-top: 2px solid var(--accent);
    pointer-events: none;
  }

  .astra-logo {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    margin-bottom: 32px;
  }

  .astra-icon {
    width: 56px;
    height: 56px;
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    background: var(--accent-soft);
  }

  .astra-icon svg {
    width: 28px;
    height: 28px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .astra-headline {
    font-size: 22px;
    font-weight: 600;
    line-height: 1.3;
    margin: 0 0 12px;
    color: var(--text);
  }

  .astra-sub {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.5;
    margin: 0 0 32px;
  }

  .astra-timer {
    font-family: 'Space Grotesk', monospace;
    font-size: 84px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--accent);
    margin-bottom: 8px;
    font-variant-numeric: tabular-nums;
  }

  .astra-timer-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .astra-progress-track {
    height: 2px;
    background: var(--border);
    width: 100%;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .astra-progress-bar {
    height: 100%;
    background: var(--accent);
    width: 100%;
    transition: width 1s linear;
  }

  .astra-fineprint {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    border-top: 1px solid var(--border);
    padding-top: 20px;
    margin: 0;
  }

  .astra-meta {
    margin-top: 24px;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.04); opacity: 0.85; }
  }

  .astra-icon { animation: pulse-ring 2s ease-in-out infinite; }
</style>
</head>
<body>
  <div class="astra-cooldown-root" role="alertdialog" aria-modal="true" aria-labelledby="astra-cooldown-headline">
    <div class="astra-cooldown-card">
      <div class="astra-logo">ASTRA SHIELD</div>

      <div class="astra-icon" aria-hidden="true">
        <!-- Hourglass / timer icon -->
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"/>
          <polyline points="12 7 12 12 15 14"/>
        </svg>
      </div>

      <h1 id="astra-cooldown-headline" class="astra-headline">You've failed a lot of challenges</h1>
      <p class="astra-sub">Astra detected suspicious repeated attempts. Please wait before trying again.</p>

      <div id="astra-cooldown-timer" class="astra-timer">60</div>
      <div class="astra-timer-label">Seconds remaining</div>

      <div class="astra-progress-track">
        <div id="astra-cooldown-progress" class="astra-progress-bar"></div>
      </div>

      <p class="astra-fineprint">This helps keep bots out while giving real users a fair chance.</p>
      <div class="astra-meta">COOLDOWN ACTIVE</div>
    </div>
  </div>

  <script>
    (function () {
      // Read seconds from query string (?seconds=60), default 60.
      var params = new URLSearchParams(window.location.search);
      var totalSeconds = parseInt(params.get('seconds') || '60', 10);
      if (!totalSeconds || totalSeconds < 1) totalSeconds = 60;

      var timerEl = document.getElementById('astra-cooldown-timer');
      var progressEl = document.getElementById('astra-cooldown-progress');
      var remaining = totalSeconds;

      function tick() {
        timerEl.textContent = String(remaining);
        var pct = Math.max(0, (remaining / totalSeconds) * 100);
        progressEl.style.width = pct + '%';
        if (remaining <= 0) {
          // Notify any embedding parent (SDK) that cooldown finished.
          try {
            window.parent && window.parent.postMessage({ type: 'astra:cooldown:complete' }, '*');
          } catch (e) {}
          // Auto-reload after the cooldown ends — the SDK will re-check status
          // server-side, so a still-blocked fingerprint will see the screen again.
          setTimeout(function () { window.location.reload(); }, 500);
          return;
        }
        remaining -= 1;
        setTimeout(tick, 1000);
      }

      tick();

      // Block back/forward navigation tricks while the screen is up.
      window.addEventListener('beforeunload', function () { /* no-op, just signal */ });
    })();
  </script>
</body>
</html>
