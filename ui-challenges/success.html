<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verified — Astra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=Geist+Mono:wght@300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #f8f9fa;
      --surface:     #ffffff;
      --surface-alt: #f1f3f5;
      --border:      #ced4da;
      --text:        #111418;
      --text-muted:  #6c757d;
      --accent:      #ad1a04;
      --font:        'IBM Plex Sans', system-ui, sans-serif;
      --mono:        'Geist Mono', 'JetBrains Mono', ui-monospace, monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      background-image: repeating-linear-gradient(
        0deg,
        rgba(206,212,218,0.45) 0px,
        rgba(206,212,218,0.45) 1px,
        transparent 1px,
        transparent 24px
      );
    }

    .container {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      padding: 48px 32px;
      text-align: center;
      position: relative;
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .wordmark .tri { color: var(--accent); font-size: 0.75em; }

    .check {
      width: 56px;
      height: 56px;
      margin: 0 auto 24px;
      border: 1px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .check svg {
      width: 26px;
      height: 26px;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-linecap: square;
      stroke-linejoin: miter;
    }

    .title {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 6px;
      letter-spacing: -0.015em;
    }

    .rule {
      width: 28px;
      height: 2px;
      background: var(--accent);
      margin: 16px auto 16px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    .meta {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 32px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @media (max-width: 400px) { .container { padding: 40px 24px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="wordmark"><span class="tri">▲</span> Astra</div>

    <div class="check">
      <svg viewBox="0 0 24 24" fill="none">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <h1 class="title">Verified</h1>
    <div class="rule"></div>
    <p class="subtitle">You're all set. No further action required.</p>

    <p class="meta">ASTRA-VERIFIED</p>
  </div>
</body>
</html>
