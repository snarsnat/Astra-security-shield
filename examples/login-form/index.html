<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASTRA Shield - Login Form Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 20px;
    }
    .login-card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo svg {
      width: 60px;
      height: 60px;
      color: #6366F1;
    }
    h1 {
      text-align: center;
      color: #1E293B;
      margin: 0 0 8px;
      font-size: 24px;
    }
    p.subtitle {
      text-align: center;
      color: #64748B;
      margin: 0 0 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #374151;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #E2E8F0;
      border-radius: 12px;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #6366F1;
    }
    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(99,102,241,0.4);
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
    }
    .message.success {
      background: #D1FAE5;
      color: #065F46;
    }
    .message.error {
      background: #FEE2E2;
      color: #991B1B;
    }
    .hint {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: #94A3B8;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>
        <path d="m9 12 2 2 4-4"/>
      </svg>
    </div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Enter your credentials to continue</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" required>
      </div>
      <button type="submit" id="submitBtn">Sign In</button>
    </form>

    <div id="message" class="message" style="display: none;"></div>
    <p class="hint">Protected by ASTRA Shield - Invisible Security</p>
  </div>

  <script src="../../dist/astra-shield.js"></script>
  <script>
    const shield = new ASTRAShield({ debug: true });
    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    function showMessage(text, type) {
      message.textContent = text;
      message.className = `message ${type}`;
      message.style.display = 'block';
    }

    shield.on('success', () => {
      showMessage('Verification complete! Redirecting...', 'success');
      setTimeout(() => {
        showMessage('Login successful! (Demo only)', 'success');
        submitBtn.disabled = false;
      }, 1500);
    });

    shield.on('blocked', (data) => {
      showMessage('Verification failed. Please try again.', 'error');
      submitBtn.disabled = false;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      message.style.display = 'none';

      const email = document.getElementById('email').value;

      // Use ASTRA Shield to protect the login
      const result = await shield.protect('login', { email });

      if (result.success) {
        // In real app: submit form to server
        console.log('Verified, submitting form...');
      } else {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
